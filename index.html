<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Random US Politician</title>

<style>
body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    max-width: 600px;
    margin: 80px auto;
    text-align: center;
}

button {
    font-size: 20px;
    padding: 12px 20px;
    border-radius: 10px;
    border: 1px solid #ccc;
    cursor: pointer;
    background: white;
}

button:hover {
    background: #f3f3f3;
}

.result {
    margin-top: 20px;
    font-size: 18px;
    color: #333;
}
</style>
</head>

<body>

<h1>Random US Politician on X</h1>

<button id="go">Take Me There</button>

<div class="result" id="result"></div>

<script>

// ===== EDIT YOUR LIST HERE =====

const people = [

{ name: "President (POTUS)", handle: "POTUS" },
{ name: "Sen. Chuck Schumer", handle: "SenSchumer" },
{ name: "Speaker Mike Johnson", handle: "SpeakerJohnson" },
{ name: "Rep. Alexandria Ocasio-Cortez", handle: "AOC" },
{ name: "Sen. Elizabeth Warren", handle: "SenWarren" },

// add more like:
// { name: "Sen. Example", handle: "ExampleHandle" }

];

// ================================

function randomPerson() {
    return people[Math.floor(Math.random() * people.length)];
}

document.getElementById("go").addEventListener("click", () => {

    const pick = randomPerson();

    const url = `https://x.com/${pick.handle}`;

    document.getElementById("result").innerHTML =
        `Going to <strong>${pick.name}</strong>...`;

    window.location.href = url;

});

</script>

</body>
</html>
